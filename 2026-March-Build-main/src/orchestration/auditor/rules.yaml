version: "FDA-GW-2016-V47"
last_updated: "2026-03-28"
rules:
  - id: "GW-001"
    code: "NO_DIAGNOSTIC_CLAIM"
    description: "Output must not claim to diagnose a specific disease or condition."
    forbidden_patterns: ["diagnose", "diagnosis", "suffering from", "positive for"]
    severity: "CRITICAL"
  - id: "GW-007"
    code: "NO_CURATIVE_PROMISE"
    description: "Output must not promise a cure or specific treatment outcome."
    forbidden_patterns: ["cure", "heal", "treat", "remedy", "fix"]
    severity: "CRITICAL"
  - id: "GW-012"
    code: "WELLNESS_FRAMING_ONLY"
    description: "Language must remain within wellness and clinical interest parameters."
    required_phrases: ["clinical interest", "correlation", "wellness"]
    severity: "MEDIUM"
  - id: "GW-024"
    code: "NO_PRESCRIPTION_MOD"
    description: "System must not suggest specific dosage changes or stopping medication."
    forbidden_patterns: ["stop taking", "increase dose", "decrease dose", "change prescription"]
    severity: "CRITICAL"
  - id: "GW-033"
    code: "PROFESSIONAL_DISCUSSION_REQUIRED"
    description: "Every brief must mandate a physician consultation."
    required_phrases: ["discuss with your doctor", "professional consultation"]
    severity: "HIGH"
